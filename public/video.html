<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Reprodução HLS</title>
</head>
<body>
  <h1>Exemplo: Streaming HLS</h1>
  
  <!-- Elemento de vídeo -->
  <video id="player" width="640" height="360" controls autoplay></video>

  <!-- HLS.js para navegadores sem suporte nativo a HLS -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // URL do arquivo .m3u8 gerado pelo FFmpeg
      const videoUrl = '/hls_output/output.m3u8';

      const video = document.getElementById('player');
      // Se o Safari/iOS/etc suportar HLS nativamente, podemos setar direto no src:
      if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = videoUrl;
      } else if (Hls.isSupported()) {
        // Para Chrome/Firefox/Edge Desktop, usamos o hls.js
        const hls = new Hls();
        hls.loadSource(videoUrl);
        hls.attachMedia(video);
      } else {
        console.log('Seu navegador não suporta HLS.');
      }
    });
  </script>
</body>
</html>
